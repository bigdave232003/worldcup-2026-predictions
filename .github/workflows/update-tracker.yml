name: Update site (tracker + next game)

# Refreshes bet_tracker.html (results) and next_game.html (next kickoff) and
# commits any change. refresh.py makes ONE /scores call (cost 2 quota) and builds
# both pages: 8 runs/day x 2 = ~480 quota/month, just under the 500 free-tier cap.
on:
  schedule:
    - cron: "13 */3 * * *"   # every 3 hours, off the :00 mark
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # needed to push the updated HTML back

concurrency:
  group: update-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Refresh tracker + next game (one API call)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python refresh.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bet_tracker.html next_game.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "Auto-update tracker + next game"
            git push
          fi
